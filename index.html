<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- SEO Básico y Open Graph -->
    <title>Jamaica - Natural Beauty</title>
    <meta name="description" content="Catálogo virtual de Jamaica Natural. Belleza natural y cuidado personal.">
    <meta property="og:title" content="Jamaica - Natural Beauty">
    <meta property="og:description" content="Productos de belleza natural y cuidado corporal de alta gama.">
    <!-- CSS Modulares -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f43f5e">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=Jamaica">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jamaica">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

    <!-- CAJA DE NOTIFICACIONES (Toast) -->
    <div id="toast-notificacion">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        <span id="toast-msg">Mensaje</span>
    </div>

    <!-- CABECERA PRINCIPAL -->
    <header class="header">
        <h1>Jamaica</h1>
    </header>

    <!-- ZONA DE BÚSQUEDA Y CATEGORÍAS -->
    <div class="filtros-container">
        <div class="search-wrapper">
            <input type="text" id="buscador" placeholder="Buscar producto o REF..." onkeyup="buscarProductos()">
        </div>

        <div class="categorias-scroll">
            <button class="cat-btn activo" onclick="filtrarCategoria('todos')">Todos</button>
            <button class="cat-btn" onclick="filtrarCategoria('capilar')">Capilar</button>
            <button class="cat-btn" onclick="filtrarCategoria('intimo')">Íntimo</button>
            <button class="cat-btn" onclick="filtrarCategoria('favoritos')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="position:relative; top:2px; margin-right:4px;">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                    </path>
                </svg> Favoritos
            </button>
            <button class="cat-btn" onclick="descargarCatalogoPDF()"
                style="background:#0f172a; color:white; border-color:#0f172a;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"
                    style="position:relative; top:2px; margin-right:4px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg> PDF
            </button>
        </div>
    </div>

    <!-- CONTENEDOR CATÁLOGO DE PRODUCTOS -->
    <main id="catalogo" class="catalogo-grid">
        <!-- Skeleton Loaders -->
        <div class="card skeleton">
            <div class="skel-img"></div>
            <div class="skel-text"></div>
            <div class="skel-text short"></div>
        </div>
        <div class="card skeleton">
            <div class="skel-img"></div>
            <div class="skel-text"></div>
            <div class="skel-text short"></div>
        </div>
    </main>

    <!-- BOTÓN CARRITO FLOTANTE -->
    <div id="cart-float" class="cart-float" onclick="abrirResumenCarrito()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        <span id="cart-count">0</span>
    </div>

    <!-- MODAL DETALLE DE PRODUCTO -->
    <div id="modal-detalle" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="close-btn" onclick="cerrarModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </div>
            <div class="modal-body-content">
                <div class="zoom-img">
                    <img id="modal-img" src="" alt="Producto" loading="lazy">
                </div>
                <div class="info-producto">
                    <span id="modal-ref" class="ref-text"></span>
                    <h2 id="modal-titulo">Cargando...</h2>
                    <p id="modal-desc" class="desc-text"></p>
                    <p class="precio-destacado" id="modal-precio"></p>

                    <h3 class="beneficios-title">Beneficios destacados</h3>
                    <ul id="modal-beneficios"></ul>

                    <div class="selector-cantidad">
                        <button onclick="cambiarCantModal(-1)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                        </button>
                        <input type="number" id="cant-prod" value="1" min="1" readonly>
                        <button onclick="cambiarCantModal(1)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                        </button>
                    </div>

                    <button class="btn-add" id="btn-add-modal" style="width:100%; padding:1.25rem;">Agregar a mi
                        pedido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL RESUMEN DEL CARRITO (CHECKOUT WPP) -->
    <div id="modal-carrito" class="modal-overlay" style="display: none;">
        <div class="modal-content modal-carrito-content">
            <div class="close-btn" onclick="cerrarCarrito()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </div>
            <h2>Tu Pedido</h2>
            <div id="carrito-lista"></div>
            <div class="resumen-total">
                <h3>Total parcial <span id="carrito-total-texto">$ 0</span></h3>
                <button class="btn-wpp" onclick="generarPedidoWpp()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                    Pedir por WhatsApp
                </button>
                <button class="btn-limpiar" onclick="vaciarCarrito()">Vaciar carrito</button>
            </div>
        </div>
    </div>

    <!-- FOOTER E ICONO OCULTO PARA PANEL ADMIN -->
    <footer class="footer">
        <p>&copy; 2026 Jamaica Natural.</p>
        <span id="admin-trigger"
            style="display:inline-block; margin-top:1rem; cursor:pointer; opacity:0; width:20px; height:20px;">.</span>
    </footer>

    <!-- PANEL ADMINISTRADOR (Oculto) -->
    <div id="admin-panel" class="modal-overlay" style="display: none;">
        <div class="modal-content admin-box" style="max-width:500px">
            <div class="close-btn" onclick="cerrarAdmin()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg></div>
            <h3 style="margin-bottom:1.5rem; color:var(--primary);">Panel Seguido</h3>

            <div id="login-admin">
                <input type="password" id="admin-pass" placeholder="Ingresa Clave">
                <button onclick="checkAccesoAdmin()" class="btn-secundario">Entrar</button>
            </div>

            <div id="form-registro" style="display: none;">
                <label>ID / Ref:</label><input type="text" id="p-id">
                <label>Título:</label><input type="text" id="p-titulo">
                <label>Descripción:</label><textarea id="p-desc"></textarea>
                <label>Precio:</label><input type="number" id="p-precio">
                <label>Categoría:</label>
                <select id="p-categoria">
                    <option value="capilar">Capilar</option>
                    <option value="intimo">Íntimo</option>
                    <option value="todos">Otros</option>
                </select>
                <label>Ruta Min. (png):</label><input type="text" id="p-img-min" value="img/prod_01.png">
                <label>Ruta Detalle (jpg):</label><input type="text" id="p-img-det" value="img/prod_01.jpeg">
                <label>Beneficios (comas):</label><textarea id="p-beneficios"></textarea>

                <button class="btn-secundario" onclick="generarJSONProducto()" style="margin-top:10px;">Generar</button>
                <textarea id="output-json" readonly style="height: 100px; margin-top:1rem;"></textarea>
            </div>
        </div>
    </div>

    <!-- JS Modular -->
    <script type="module" src="js/app.js"></script>

    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered:', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed:', registrationError);
                });
            });
        }
    </script>
</body>

</html>
