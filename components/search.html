<!-- ZONA DE BÚSQUEDA Y CATEGORÍAS -->
<div class="filtros-container">
    <div class="search-wrapper">
        <input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="buscarProductos()">
        <button type="button" class="search-btn" onclick="buscarProductos()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
        </button>
    </div>

    <div class="categorias-scroll">
        <button class="cat-btn activo" data-cat="todos" onclick="filtrarCategoria('todos')">Todos</button>
        <button class="cat-btn" data-cat="favoritos" onclick="filtrarCategoria('favoritos')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="position:relative; top:2px; margin-right:4px;">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg> Favoritos
        </button>
        <button class="cat-btn" onclick="descargarCatalogoPDF()"
            style="background:#0f172a; color:white; border-color:#0f172a;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                style="position:relative; top:2px; margin-right:4px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg> PDF
        </button>
    </div>
</div>
